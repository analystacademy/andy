<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andy — Analyst Academy Intelligence Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    h1 span { color: #ff0000; }
    p { color: #888; font-size: 14px; margin-bottom: 40px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 16px 28px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #ff0000; color: #fff; }
    .tag { font-size: 11px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Analyst <span>Academy</span> — Intelligence Hub</h1>
  <p>Built and maintained by Andy (AI) · Updated weekly</p>
  <div class="links">
    <a href="/andy/youtube/">
      📊 YouTube Dashboard
      <div class="tag">Channel stats · Top comments · Competitor tracker · Trending topics</div>
    </a>
  </div>
</body>
</html>
