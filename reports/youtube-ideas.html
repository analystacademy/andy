let filtered = [...ALL];
let sortCol = 'rank';
let sortDir = 1;
let topN = 0;

// Populate filters
function populateFilter(id, key) {
  const el = document.getElementById(id);
  const vals = [...new Set(ALL.map(x => x[key]))].sort();
  vals.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    el.appendChild(o);
  });
}
populateFilter('filterCat','category');
populateFilter('filterFmt','format');
populateFilter('filterDiff','difficulty');
populateFilter('filterInsp','inspiration');

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filterCat').value;
  const fmt = document.getElementById('filterFmt').value;
  const diff = document.getElementById('filterDiff').value;
  const insp = document.getElementById('filterInsp').value;
  filtered = ALL.filter(x => {
    if(q && !x.title.toLowerCase().includes(q)) return false;
    if(cat && x.category !== cat) return false;
    if(fmt && x.format !== fmt) return false;
    if(diff && x.difficulty !== diff) return false;
    if(insp && x.inspiration !== insp) return false;
    return true;
  });
  sortAndRender();
}

function sortBy(col) {
  if(sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.dataset.col === col) th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  });
  sortAndRender();
}

function sortAndRender() {
  const s = [...filtered].sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if(typeof av === 'number') return sortDir*(av-bv);
    return sortDir * String(av).localeCompare(String(bv));
  });
  const show = topN > 0 ? s.slice(0, topN) : s;
  renderTable(show);
  document.getElementById('count').textContent = `Showing ${show.length} of ${ALL.length} ideas`;
  document.getElementById('noResults').style.display = show.length ? 'none' : 'block';
  document.getElementById('tableWrap').querySelector('table').style.display = show.length ? '' : 'none';
}

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.map(x => `<tr>
    <td class="rank">${x.rank}</td>
    <td class="title-cell">${esc(x.title)}</td>
    <td><span class="cat">${esc(x.category)}</span></td>
    <td><span class="fmt">${esc(x.format)}</span></td>
    <td><span class="insp">${esc(x.inspiration)}</span></td>
    <td><span class="diff diff-${x.difficulty}">${x.difficulty}</span></td>
    <td class="trend">${x.trending}/10</td>
    <td class="notes-cell">${esc(x.notes)}</td>
  </tr>`).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setTop(n) {
  topN = n;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if(n===50) document.querySelectorAll('.btn')[0].classList.add('active');
  else if(n===100) document.querySelectorAll('.btn')[1].classList.add('active');
  else document.getElementById('btn-all').classList.add('active');
  sortAndRender();
}

function exportCSV() {
  const cols = ['rank','title','category','format','inspiration','difficulty','trending','notes'];
  const rows = [cols.join(',')];
  filtered.forEach(x => {
    rows.push(cols.map(c => `"${String(x[c]).replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'analyst-academy-youtube-ideas.csv';
  a.click();
}

// Initial render
sortAndRender();
</script>
